<!DOCTYPE html>
<html>
<head>
    <title>AI Medical Chatbot</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">
    <h1>🩺 AI Medical Chatbot</h1>

    <input type="text" id="userInput" placeholder="Enter symptoms like fever cough">

    <!-- 🎤 Voice Button -->
    <button onclick="startVoice()">🎤 Speak</button>

    <br><br>

    <label>Gender:</label>
    <select id="gender" onchange="checkPregnancy()">
        <option value="male">Male</option>
        <option value="female">Female</option>
    </select>

    <br><br>

    <label>Age:</label>
    <input type="number" id="age" placeholder="Enter age">

    <br><br>

    <div id="pregnancyBox" style="display:none;">
        <label>Are you pregnant?</label>
        <select id="pregnant">
            <option value="no">No</option>
            <option value="yes">Yes</option>
        </select>
    </div>

    <br><br>

    <button onclick="sendMessage()">Analyze</button>

    <div id="result"></div>
</div>

<script src="script.js"></script>

</body>
</html>
